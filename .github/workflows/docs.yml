name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build and deploy documentation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check documentation
        run: pnpm --dir website run typecheck

      - name: Build documentation
        run: pnpm --dir website run build
        env:
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_API_KEY: ${{ secrets.ALGOLIA_SEARCH_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}

      - name: Test documentation serving
        run: |
          pnpm --dir website exec docusaurus serve --host 127.0.0.1 --port 3000 &
          server_pid=$!
          trap 'kill "$server_pid" || true' EXIT

          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          exit 1

      - name: Run Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: website/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v5
