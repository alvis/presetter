tag_pattern: 'v[0-9].*'

changelog:
  header: |
    # Changelog

    All notable changes to this project will be documented in this file.

  body: |
    {%- macro commit_line(commit) -%}
    * {% if commit.scope %}**{{ commit.scope }}:** {% endif -%}
    {{ commit.message | split(pat="\n") | first | trim | split(pat=": ") | last | trim -}}
    {{ " " }}({{ commit.id | truncate(length=7, end="") }})
    {%- endmacro -%}

    {% if version -%}
    # {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
    {% else -%}
    # Unreleased
    {% endif %}
    {%- for group, commits in commits | group_by(attribute="group") %}

    ### {{ group }}

    {% for commit in commits -%}
    {{ self::commit_line(commit=commit) }}
    {% endfor -%}
    {%- endfor -%}

  trim: true

git:
  conventional_commits: true
  filter_unconventional: false
  split_commits: false
  protect_breaking_commits: true
  commit_parsers:
    - message: '^feat'
      group: '✨ Features'
    - message: '^fix'
      group: '🐞 Bug Fixes'
    - message: '^perf'
      group: '🚀 Performance Improvements'
    - message: '^build'
      group: '🛠 Builds'
    - message: '^refactor'
      group: '📦 Code Refactoring'
    - message: '^docs?'
      group: '📚 Documentation'
    - message: '^test'
      group: '🚨 Tests'
    - message: '^ci'
      group: '⚙️ Continuous Integrations'
    - message: '^chore\(release\)'
      skip: true
    - message: '^chore'
      group: '♻️ Chores'
    - message: '^style'
      group: '💎 Styles'
    - message: '^revert'
      group: '🗑 Reverts'
