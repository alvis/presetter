build: run-s clean build:artifact build:typescript
build:artifact: run-s build:artifact:*
build:artifact:package: zx --eval "fs.ensureDir('{output}')"
build:typescript: echo "You must explicitly define your build target. Try @presetter/preset-esm or @presetter/preset-cjs to set it up."; exit 1
build:typescript:tsc: tsc -p tsconfig.build.json
build:typescript:alias: run-s build:typescript:alias:*
build:typescript:alias:lib: tsc-alias --resolve-full-paths --dir {output}
build:typescript:alias:root: tsc-alias --resolve-full-paths --dir .
clean: run-s clean:**
clean:lib: zx --eval "fs.remove('{output}')"
clean:coverage: zx --eval "fs.remove('coverage')"
clean:tsc: zx --eval "fs.remove('tsconfig.build.tsbuildinfo')"
lint: run-s "lint:* -- {@:{source} {test}}" --
lint:prettier: prettier --write --no-error-on-unmatched-pattern
lint:eslint: eslint --flag v10_config_lookup_from_file --fix --format stylish --no-error-on-unmatched-pattern --no-warn-ignored --cache --cache-strategy content
lint:fixme: leasot --ignore '**/node_modules' --skip-unsupported --exit-nicely package.json
lint-staged: lint-staged
prepare: run-s setup
prepublishOnly: run-s clean build
release: run-s release:changelog release:commit
release:changelog: >-
  V="${VERSION:-$(git-cliff --config $(git rev-parse --show-toplevel)/cliff.yaml ${PRERELEASE:+--prerelease "$PRERELEASE"} --bumped-version | sed 's/^v//')}" &&
  npm pkg set version="$V" &&
  P=$(git rev-parse --show-prefix) && git-cliff --config $(git rev-parse --show-toplevel)/cliff.yaml --tag "v$V"
  ${P:+--include-path "${P}**"} --output CHANGELOG.md &&
  git add package.json CHANGELOG.md
release:commit: >-
  V=$(npm pkg get version | tr -d '"') &&
  git commit -m "chore(release): publish v$V" && git tag "v$V"
release:notes: git-cliff --config $(git rev-parse --show-toplevel)/cliff.yaml --latest --strip header
setup: run-p setup:*
setup:husky: husky || true
setup:presetter: presetter bootstrap
stage: run-p "stage:* -- {@}" --
stage:lint: run-s "lint:prettier -- {@}" --
start: run-p "build:typescript -- -w" "build:types:* -- -w"
pretest: run-s pretest:unit:*
test: 'run-s "test:vitest -- {@:--project=*:UNIT}" --'
test:vitest: vitest --passWithNoTests
test:coverage: 'run-s "test -- --project=*:UNIT --coverage {@}" --'
test:watch: 'run-s "test -- --watch {@}" --'
pretest:unit: run-s pretest:unit:*
test:unit: run-s "test -- --project=*:UNIT {@}" --
pretest:int: run-s pretest:int:*
test:int: run-s "test -- --project=*:INT {@}" --
pretest:e2e: run-s pretest:e2e:*
test:e2e: run-s "test -- --project=*:E2E {@}" --
typecheck: tsc --noEmit --skipLibCheck
